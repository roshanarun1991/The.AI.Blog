services:
  - type: web
    name: the-ai-blog
    runtime: static
    plan: free
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    previews:
      generation: automatic
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
